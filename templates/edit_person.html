{% extends "base.html" %}
{% block title %}Edit {{ person.display_name }} | Smart Database{% endblock %}
{% block content %}
  <section class="page-header">
    <div>
      <p class="eyebrow" data-i18n="edit">Edit</p>
      <h1><i class="fa-solid fa-user-pen"></i> <span data-i18n="edit_person">Edit Person</span></h1>
    </div>
  </section>

  <form class="form-panel" action="/people/{{ person.id }}/edit" method="post" enctype="multipart/form-data">
    <section class="form-section photo-section">
      <h2><i class="fa-solid fa-image"></i> <span data-i18n="main_photo">Photo</span></h2>
      <div class="upload-preview">
        {% if person.image_path %}<img class="profile-image" src="{{ person.image_path }}" alt="" data-image-preview>{% else %}<span class="profile-image fallback" data-image-fallback>P</span><img class="profile-image hidden" alt="" data-image-preview>{% endif %}
        <label><span data-i18n="person_image">Person Image</span><input type="file" name="image" accept=".jpg,.jpeg,.png,.webp,image/jpeg,image/png,image/webp" data-preview-input></label>
      </div>
    </section>
    <section class="form-section">
      <h2 data-i18n="name_information">Name Information</h2>
      <div class="form-grid">
        <label><span data-i18n="first_name">First Name</span><input name="first_name" value="{{ person.first_name or '' }}" required></label>
        <label><span data-i18n="second_name">Second Name</span><input name="second_name" value="{{ person.second_name or '' }}"></label>
        <label><span data-i18n="third_name">Third Name</span><input name="third_name" value="{{ person.third_name or '' }}"></label>
        <label><span data-i18n="fourth_name">Fourth Name</span><input name="fourth_name" value="{{ person.fourth_name or '' }}"></label>
        <label><span data-i18n="family_name">Family Name</span><input name="family_name" value="{{ person.family_name or '' }}"></label>
        <label><span data-i18n="tribe_name">Tribe Name</span><input name="tribe_name" value="{{ person.tribe_name or '' }}"></label>
      </div>
    </section>
    <section class="form-section">
      <h2 data-i18n="identity">Identity</h2>
      <div class="form-grid">
        <label><span data-i18n="gender">Gender</span><select name="gender">{% if person.gender and person.gender not in genders %}<option value="{{ person.gender }}" data-option-label="{{ person.gender }}" selected>{{ person.gender }}</option>{% endif %}{% for item in genders %}<option value="{{ item }}" data-option-label="{{ item }}" {{ 'selected' if person.gender == item else '' }}>{{ item }}</option>{% endfor %}</select></label>
        <label><span data-i18n="nationality">Nationality</span><select name="nationality">{% if person.nationality and person.nationality not in nationalities %}<option value="{{ person.nationality }}" data-option-label="{{ person.nationality }}" selected>{{ person.nationality }}</option>{% endif %}{% for item in nationalities %}<option value="{{ item }}" data-option-label="{{ item }}" {{ 'selected' if person.nationality == item else '' }}>{{ item }}</option>{% endfor %}</select></label>
        <label><span data-i18n="status">Status</span><select name="status">{% if person.status and person.status not in person_statuses %}<option value="{{ person.status }}" data-option-label="{{ person.status }}" selected>{{ person.status }}</option>{% endif %}{% for item in person_statuses %}<option value="{{ item }}" data-option-label="{{ item }}" {{ 'selected' if person.status == item else '' }}>{{ item }}</option>{% endfor %}</select></label>
        <label><span data-i18n="category">Category</span><select name="category">{% if person.category and person.category not in person_categories %}<option value="{{ person.category }}" data-option-label="{{ person.category }}" selected>{{ person.category }}</option>{% endif %}{% for item in person_categories %}<option value="{{ item }}" data-option-label="{{ item }}" {{ 'selected' if person.category == item else '' }}>{{ item }}</option>{% endfor %}</select></label>
        <label><span data-i18n="birth_date">Birth Date</span><input type="date" name="birth_date" value="{{ person.birth_date or '' }}"></label>
        <label><span data-i18n="birth_place">Birth Place</span><input name="birth_place" value="{{ person.birth_place or '' }}"></label>
      </div>
    </section>
    <section class="form-section">
      <h2 data-i18n="tags">Tags</h2>
      <label><span data-i18n="tags">Tags</span><input name="tags" value="{{ person.tags or '' }}" data-i18n-placeholder="tags_placeholder"></label>
    </section>
    <div class="actions">
      <a class="button secondary" href="/people/{{ person.id }}"><i class="fa-solid fa-xmark"></i> <span data-i18n="cancel">Cancel</span></a>
      <button class="button" type="submit"><i class="fa-solid fa-check"></i> <span data-i18n="save_changes">Save Changes</span></button>
    </div>
  </form>
{% endblock %}
